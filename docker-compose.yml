version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.caprover
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/clickvid
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=test-secret-change-in-production
      - AUTH_SECRET=test-secret-change-in-production
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_PROVIDER_PRIORITY=gemini,openai,anthropic
    depends_on:
      - db
      - redis
    restart: unless-stopped
    env_file:
      - .env.production

  worker:
    build:
      context: .
      dockerfile: Dockerfile.caprover
    command: npm run worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/clickvid
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=test-secret-change-in-production
      - AUTH_SECRET=test-secret-change-in-production
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_PROVIDER_PRIORITY=gemini,openai,anthropic
    depends_on:
      - db
      - redis
    restart: unless-stopped
    env_file:
      - .env.production

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clickvid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
